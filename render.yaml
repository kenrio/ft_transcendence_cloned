services:
    - type: web
      name: oekaki-backend-kenrio
      runtime: node
      region: singapore
      plan: free
      rootDir: backend
      buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
      startCommand: npx tsx src/server.ts
      envVars:
          - key: NODE_ENV
            value: production
          - key: DATABASE_URL
            sync: false
          - key: JWT_SECRET
            sync: false
          - key: GOOGLE_CLIENT_ID
            sync: false
          - key: GOOGLE_CLIENT_SECRET
            sync: false
          - key: FRONTEND
            sync: false
    - type: web
      name: oekaki-frontend-kenrio
      runtime: static
      rootDir: frontend
      buildCommand: npm ci && npm run build
      staticPublishPath: ./dist
      routes:
          - type: rewrite
            source: /api/*
            destination: https://oekaki-backend-kenrio.onrender.com/api/*
          - type: rewrite
            source: /v1/*
            destination: https://oekaki-backend-kenrio.onrender.com/v1/*
          - type: rewrite
            source: /ws
            destination: https://oekaki-backend-kenrio.onrender.com/ws
          - type: rewrite
            source: /*
            destination: /index.html
